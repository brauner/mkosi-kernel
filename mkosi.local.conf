[Content]
Autologin=yes
Ssh=yes
Bootable=yes
Bootloader=systemd-boot
KernelCommandLine=console=ttyS0 memmap=2G!4G! memmap=2G!8G
# BuildSources=bpfilter:bpfilter
BuildSources=bpftrace:bpftrace
BuildSources=blktests:blktests
# BuildSources=btrfs-progs:btrfs-progs
BuildSources=fio:fio
BuildSources=fstests:fstests
BuildSources=ltp:ltp
BuildSources=/home/ubuntu/data/kernel/linux:kernel

[Config]
# Include=modules/bpfilter
Include=modules/bpftrace
Include=modules/blktests
# Include=modules/btrfs-progs
Include=modules/fio
Include=modules/fstests
Include=modules/ltp
Include=modules/kernel

[Output]
Format=disk
WorkspaceDirectory=${HOME}/data/mkosi-cache
